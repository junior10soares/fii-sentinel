name: CI pipeline

on:
  pull_request:
    paths:
      - "pipeline/**"
  push:
    branches: [main]
    paths:
      - "pipeline/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest
